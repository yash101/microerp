services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: microerp
      POSTGRES_PASSWORD: microerp
      POSTGRES_DB: microerp
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - microerp-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U microerp -d microerp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  microerp-postgres:
